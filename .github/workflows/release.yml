name: Build and Release

on:
  push:
    tags: ['v*']

jobs:
  # ── macOS arm64 ───────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install OBS
        run: brew install --cask obs

      - name: Configure
        run: cmake -S obs-plugin -B obs-plugin/build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build obs-plugin/build

      - name: Package
        run: |
          cd obs-plugin/build
          zip -r ../../obs-game-translator-macos-arm64.zip obs-game-translator.plugin

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: obs-game-translator-macos-arm64.zip

  # ── Windows x64 ───────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install curl via vcpkg
        run: vcpkg install curl:x64-windows
        shell: pwsh

      - name: Download OBS 29.1.3
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/obsproject/obs-studio/releases/download/29.1.3/OBS-Studio-29.1.3.zip" `
            -OutFile obs-windows.zip
          Expand-Archive -Path obs-windows.zip -DestinationPath obs-studio-extracted

      - name: Generate obs.lib from obs.dll
        shell: pwsh
        run: |
          $obsDll = Get-ChildItem -Recurse -Filter "obs.dll" obs-studio-extracted |
                    Where-Object { $_.FullName -like "*\bin\64bit\obs.dll" } |
                    Select-Object -First 1

          if (-not $obsDll) {
            $obsDll = Get-ChildItem -Recurse -Filter "obs.dll" obs-studio-extracted |
                      Select-Object -First 1
          }

          if (-not $obsDll) {
            Write-Error "obs.dll not found. Zip contents:"
            Get-ChildItem -Recurse obs-studio-extracted | Select-Object -First 30 | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          Write-Host "Found obs.dll: $($obsDll.FullName)"
          $obsBinDir = $obsDll.DirectoryName
          $defPath = "$obsBinDir\obs.def"
          $libPath = "$obsBinDir\obs.lib"

          # Parse PE export table with Python (no dumpbin text-format dependency)
          $pyScript = @'
import struct, sys
dll, out = sys.argv[1], sys.argv[2]
with open(dll, 'rb') as f:
    data = f.read()
e = struct.unpack_from('<I', data, 0x3c)[0]
assert data[e:e+4] == b'PE\x00\x00', "Not a PE file"
coff = e + 4
ns  = struct.unpack_from('<H', data, coff+2)[0]
oph = struct.unpack_from('<H', data, coff+16)[0]
opt = coff + 20
m   = struct.unpack_from('<H', data, opt)[0]
exp_rva = struct.unpack_from('<I', data, opt + (112 if m == 0x20b else 96))[0]
secs = opt + oph
def r2o(rva):
    for i in range(ns):
        s=secs+i*40
        va=struct.unpack_from('<I',data,s+12)[0]
        vs=struct.unpack_from('<I',data,s+16)[0]
        ro=struct.unpack_from('<I',data,s+20)[0]
        if va<=rva<va+vs: return rva-va+ro
    raise ValueError(f'unmapped RVA 0x{rva:x}')
eo  = r2o(exp_rva)
nn  = struct.unpack_from('<I', data, eo+24)[0]
nro = struct.unpack_from('<I', data, eo+32)[0]
no  = r2o(nro)
names = []
for i in range(nn):
    nr  = struct.unpack_from('<I', data, no+i*4)[0]
    noo = r2o(nr)
    end = data.index(b'\x00', noo)
    names.append(data[noo:end].decode())
with open(out, 'w') as f:
    f.write('LIBRARY obs\nEXPORTS\n')
    for n in names:
        f.write(f'    {n}\n')
print(f'Generated {out} with {len(names)} exports')
'@
          $pyScript | Out-File -FilePath "$env:TEMP\gen_def.py" -Encoding UTF8
          python "$env:TEMP\gen_def.py" $obsDll.FullName $defPath
          if ($LASTEXITCODE -ne 0) { Write-Error "PE parsing failed"; exit 1 }

          $cnt = (Select-String -Path $defPath -Pattern '^\s+\w').Count
          Write-Host "obs.def: $cnt exports"
          if ($cnt -eq 0) { Write-Error "obs.def is empty — PE parsing produced no exports"; exit 1 }

          # Create import library
          lib /def:$defPath /out:$libPath /machine:x64
          if ($LASTEXITCODE -ne 0) { exit 1 }

          # Compute OBS root (grandparent of bin/64bit/)
          $obsRoot = $obsDll.Directory.Parent.Parent.FullName
          Write-Host "OBS_DIR=$obsRoot"
          "OBS_DIR=$obsRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: |
          cmake -S obs-plugin -B obs-plugin/build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            "-DOBS_DIR=$env:OBS_DIR" `
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build obs-plugin/build
        shell: pwsh

      - name: Package
        shell: pwsh
        run: |
          $pkgDir = "pkg\obs-game-translator\bin\64bit"
          New-Item -ItemType Directory -Path $pkgDir -Force
          Copy-Item "obs-plugin\build\obs-game-translator.dll" "$pkgDir\"
          Compress-Archive -Path "pkg\obs-game-translator" -DestinationPath "obs-game-translator-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: obs-game-translator-windows-x64.zip

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-arm64

      - uses: actions/download-artifact@v4
        with:
          name: windows-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            obs-game-translator-macos-arm64.zip
            obs-game-translator-windows-x64.zip
