name: Build and Release

on:
  push:
    tags: ['v*']

jobs:
  # ── macOS arm64 ───────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install OBS
        run: brew install --cask obs

      - name: Configure
        run: cmake -S obs-plugin -B obs-plugin/build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build obs-plugin/build

      - name: Package
        run: |
          cd obs-plugin/build
          zip -r ../../obs-game-translator-macos-arm64.zip obs-game-translator.plugin

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: obs-game-translator-macos-arm64.zip

  # ── Windows x64 ───────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install curl via vcpkg
        run: vcpkg install curl:x64-windows
        shell: pwsh

      - name: Download OBS 29.1.3
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/obsproject/obs-studio/releases/download/29.1.3/OBS-Studio-29.1.3.zip" `
            -OutFile obs-windows.zip
          Expand-Archive -Path obs-windows.zip -DestinationPath obs-studio-extracted

      - name: Generate obs.lib from obs.dll
        shell: pwsh
        run: |
          $obsDll = Get-ChildItem -Recurse -Filter "obs.dll" obs-studio-extracted |
                    Where-Object { $_.FullName -like "*\bin\64bit\obs.dll" } |
                    Select-Object -First 1

          if (-not $obsDll) {
            # Fallback: any obs.dll
            $obsDll = Get-ChildItem -Recurse -Filter "obs.dll" obs-studio-extracted |
                      Select-Object -First 1
          }

          Write-Host "Found obs.dll: $($obsDll.FullName)"
          $obsBinDir = $obsDll.DirectoryName

          # dumpbin outputs exports; parse into a .def file
          $raw = & dumpbin /exports $obsDll.FullName
          $defLines = @("LIBRARY obs", "EXPORTS")
          foreach ($line in $raw) {
            # Match export lines: "    <ordinal>    <hint>  <RVA>  <name>"
            if ($line -match '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(\S+)\s*$') {
              $defLines += "    $($Matches[1])"
            }
          }
          $defLines | Out-File -FilePath "$obsBinDir\obs.def" -Encoding ASCII

          # Create import library
          lib /def:"$obsBinDir\obs.def" /out:"$obsBinDir\obs.lib" /machine:x64

          # Compute OBS root (grandparent of bin/64bit/)
          $obsRoot = $obsDll.Directory.Parent.Parent.FullName
          Write-Host "OBS_DIR=$obsRoot"
          "OBS_DIR=$obsRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: |
          cmake -S obs-plugin -B obs-plugin/build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            "-DOBS_DIR=$env:OBS_DIR" `
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build obs-plugin/build
        shell: pwsh

      - name: Package
        shell: pwsh
        run: |
          $pkgDir = "pkg\obs-game-translator\bin\64bit"
          New-Item -ItemType Directory -Path $pkgDir -Force
          Copy-Item "obs-plugin\build\obs-game-translator.dll" "$pkgDir\"
          Compress-Archive -Path "pkg\obs-game-translator" -DestinationPath "obs-game-translator-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: obs-game-translator-windows-x64.zip

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-arm64

      - uses: actions/download-artifact@v4
        with:
          name: windows-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            obs-game-translator-macos-arm64.zip
            obs-game-translator-windows-x64.zip
