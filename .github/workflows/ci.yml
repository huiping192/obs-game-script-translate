name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Configure with tests
        run: cmake -S obs-plugin -B obs-plugin/build -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build obs-plugin/build

      - name: Run tests
        run: cd obs-plugin/build && ctest --output-on-failure
